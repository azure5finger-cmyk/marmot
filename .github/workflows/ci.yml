name: CI
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+aiosqlite:///./ci_test.db
      SECRET_KEY: test-secret-key-for-ci
      ACCESS_TOKEN_EXPIRE_HOURS: 2
      GEMINI_API_KEY: dummy-key
    steps:
      - name: Checkout code
        uses: actions/checkout@v5       # ✅ v4 → v5
      - name: Set up Python
        uses: actions/setup-python@v6  # ✅ v5 → v6
        with:
          python-version: "3.12"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run selected tests
        run: pytest test_ai_service.py test_user.py test_timer.py test_stats.py
